<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Aurora cluster architecture</title>
  <desc id="desc">Diagram showing applications connecting to Aurora writer and reader endpoints, with compute instances using a distributed storage volume across three Availability Zones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="676" rx="30" fill="#ffffff" stroke="#d9e2ef" stroke-width="3"/>

  <text x="80" y="100" fill="#101828" font-family="Arial, sans-serif" font-size="38" font-weight="800">Amazon Aurora DB Cluster</text>
  <text x="80" y="135" fill="#667085" font-family="Arial, sans-serif" font-size="20">Compute is separated from distributed storage replicated across Availability Zones.</text>

  <rect x="80" y="185" width="230" height="110" rx="22" fill="#0f172a" filter="url(#shadow)"/>
  <text x="195" y="235" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Application</text>
  <text x="195" y="265" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">API / Services</text>

  <rect x="390" y="165" width="250" height="70" rx="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="515" y="208" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Cluster Endpoint</text>

  <rect x="390" y="255" width="250" height="70" rx="18" fill="#eef4ff" stroke="#c7d7fe" stroke-width="2"/>
  <text x="515" y="298" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Reader Endpoint</text>

  <line x1="310" y1="230" x2="384" y2="200" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="310" y1="252" x2="384" y2="290" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="735" y="150" width="300" height="120" rx="24" fill="url(#primary)" filter="url(#shadow)"/>
  <text x="885" y="202" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle">Writer Instance</text>
  <text x="885" y="235" fill="#dbeafe" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Reads + writes</text>

  <rect x="705" y="315" width="170" height="92" rx="20" fill="#ffffff" stroke="#93c5fd" stroke-width="3" filter="url(#shadow)"/>
  <text x="790" y="355" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Reader 1</text>
  <text x="790" y="382" fill="#667085" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">Read replica</text>

  <rect x="900" y="315" width="170" height="92" rx="20" fill="#ffffff" stroke="#93c5fd" stroke-width="3" filter="url(#shadow)"/>
  <text x="985" y="355" fill="#1e3a8a" font-family="Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Reader 2</text>
  <text x="985" y="382" fill="#667085" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">Failover target</text>

  <line x1="640" y1="200" x2="728" y2="200" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="640" y1="290" x2="700" y2="350" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="640" y1="290" x2="895" y2="350" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="150" y="500" width="900" height="145" rx="28" fill="url(#storage)" filter="url(#shadow)"/>
  <text x="600" y="548" fill="#111827" font-family="Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Shared Aurora Cluster Volume</text>
  <text x="600" y="580" fill="#3b2f00" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Distributed storage replicated across three Availability Zones</text>

  <g font-family="Arial, sans-serif" font-weight="800" font-size="18" text-anchor="middle">
    <rect x="220" y="602" width="190" height="42" rx="15" fill="#ffffff" opacity="0.92"/>
    <text x="315" y="630" fill="#7c4a03">AZ A Storage</text>
    <rect x="505" y="602" width="190" height="42" rx="15" fill="#ffffff" opacity="0.92"/>
    <text x="600" y="630" fill="#7c4a03">AZ B Storage</text>
    <rect x="790" y="602" width="190" height="42" rx="15" fill="#ffffff" opacity="0.92"/>
    <text x="885" y="630" fill="#7c4a03">AZ C Storage</text>
  </g>

  <line x1="885" y1="270" x2="885" y2="492" stroke="#ff9900" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="790" y1="407" x2="500" y2="492" stroke="#ff9900" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="985" y1="407" x2="700" y2="492" stroke="#ff9900" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="600" y="690" fill="#667085" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">Local documentation diagram for Aurora introduction page</text>
</svg>
